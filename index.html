<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jeevan Rakshak UP</title>

<style>
body{
font-family: Arial;
margin:0;
background:#f4f4f4;
text-align:center;
}

header{
background:#ff6f00;
color:white;
padding:20px;
font-size:22px;
}

.tagline{
font-size:14px;
margin-top:5px;
}

.gov{
font-size:12px;
color:#006400;
margin-top:5px;
}

.container{
padding:15px;
}

button{
width:90%;
padding:16px;
margin:10px;
font-size:17px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
}

.emergency{
background:red;
font-size:20px;
}

.card{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
}

.card h3{
margin:0 0 10px 0;
color:#1976d2;
}
</style>

</head>

<body>

<header>
🚑 Jeevan Rakshak UP
<div class="tagline">Saving Lives Across Uttar Pradesh</div>
<div class="gov">Government of Uttar Pradesh – Prototype</div>
</header>

<div class="container">

<button onclick="getLocation()">📍 Find Nearby Hospitals</button>

<button onclick="showHospitals()">🏥 UP Hospital List</button>

<button onclick="showBlood()">🩸 Blood Availability</button>

<button onclick="openMap()">🗺 View Live Hospital Map</button>

<button class="emergency" onclick="sendSOS()">🚨 SOS Alert</button>

<a href="tel:108">
<button class="emergency">🚑 Call Ambulance (108)</button>
</a>

<button onclick="startTracking()">📡 Start Live Tracking</button>
<button onclick="stopTracking()">⛔ Stop Tracking</button>

<button onclick="showUser()">👤 User Profile</button>
<button onclick="showAppointment()">📅 Book Appointment</button>
<button onclick="showDoctors()">🩺 Doctors</button>
<button onclick="showAmbulance()">🚑 Ambulance</button>
<button onclick="showPharmacy()">💊 Pharmacy</button>
<button onclick="showEmergency()">🚨 Emergency Services</button>
<button onclick="showAnalytics()">📊 Analytics</button>
<button onclick="showAccessibility()">♿ Accessibility</button>

<div id="output"></div>

</div>

<script>

// LOCATION FUNCTION
function getLocation(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(showPosition);
}else{
alert("Location not supported");
}
}

function showPosition(position){
let lat = position.coords.latitude;
let lon = position.coords.longitude;

document.getElementById("output").innerHTML =
`
<div class="card">
📍 Your Location:<br>
Lat: ${lat}<br>
Lon: ${lon}
</div>

<a href="https://www.google.com/maps/search/hospital/@${lat},${lon},15z" target="_blank">
<button>🏥 View Nearby Hospitals</button>
</a>
`;
}

// HOSPITAL LIST
function showHospitals(){
document.getElementById("output").innerHTML =
`
<div class="card">
<h3>King George Medical University, Lucknow</h3>
🛏 Total Beds: 1200<br>
❤️ ICU Beds: 45<br>
👶 NICU Beds: 20<br>
Status: 🟢 Available
</div>

<div class="card">
<h3>SGPGI Lucknow</h3>
🛏 Total Beds: 900<br>
❤️ ICU Beds: 60<br>
👶 NICU Beds: 25<br>
Status: 🟡 Limited Availability
</div>

<div class="card">
<h3>AIIMS Gorakhpur</h3>
🛏 Total Beds: 750<br>
❤️ ICU Beds: 30<br>
👶 NICU Beds: 15<br>
Status: 🔴 Full
</div>

<div class="card">
<h3>District Hospital Noida</h3>
🛏 Total Beds: 500<br>
❤️ ICU Beds: 20<br>
👶 NICU Beds: 10<br>
Status: 🟢 Available
</div>
`;
}

// BLOOD DATA
function showBlood(){
document.getElementById("output").innerHTML =
`
<div class="card">Red Cross Blood Bank<br>Available: O+, A+</div>
<div class="card">District Hospital Blood Bank<br>Available: B+, AB+</div>
`;
}

// MAP
function openMap(){
window.open("https://www.google.com/maps/search/hospital+near+me");
}

// SOS FUNCTION
function sendSOS(){
navigator.geolocation.getCurrentPosition(function(pos){
let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

let message = `EMERGENCY! I need help. My location: https://maps.google.com/?q=${lat},${lon}`;

alert("SOS Message:\n" + message);
});
}

// USER PROFILE
function showUser(){
  document.getElementById("output").innerHTML = `
  <div class="card">
    <h3>User Profile</h3>
    Blood Group: O+<br>
    Allergies: None<br>
    Emergency Contact: 9876543210<br>
    Medical History: Diabetes
  </div>`;
}

// APPOINTMENT
function showAppointment(){
  document.getElementById("output").innerHTML = `
  <div class="card">
    <h3>Book Appointment</h3>
    Doctor: Dr. Sharma (Cardiologist)<br>
    Available: Today 5 PM<br>
    <button>Book Now</button>
  </div>`;
}

// DOCTORS
function showDoctors(){
  document.getElementById("output").innerHTML = `
  <div class="card">Cardiologist - Available</div>
  <div class="card">Pediatrician - Available</div>
  <div class="card">Neurologist - Busy</div>
  `;
}

// AMBULANCE
function showAmbulance(){
  document.getElementById("output").innerHTML = `
  <div class="card">
    Nearest Ambulance: 2 km away<br>
    ETA: 6 minutes
  </div>`;
}

// PHARMACY
function showPharmacy(){
  document.getElementById("output").innerHTML = `
  <div class="card">
    Apollo Pharmacy<br>
    Medicine: Available<br>
    Price: ₹120
  </div>`;
}

// EMERGENCY SERVICES
function showEmergency(){
  document.getElementById("output").innerHTML = `
  <div class="card">
    Police Station: 2 km<br>
    Fire Station: 3 km<br>
    <button onclick="alert('Reporting Accident')">Report Accident</button>
  </div>`;
}

// ANALYTICS
function showAnalytics(){
  document.getElementById("output").innerHTML = `
  <div class="card">
    Peak Hospital Time: 6 PM<br>
    Bed Demand: High<br>
    Emergency Cases: Increasing
  </div>`;
}

// ACCESSIBILITY
function showAccessibility(){
  document.body.style.fontSize = "20px";
  alert("Accessibility Mode Enabled");
}

</script>

</body>
</html>
