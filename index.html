<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jeevan Rakshak UP</title>

<style>
body{
font-family: Arial;
margin:0;
background:#f4f4f4;
text-align:center;
}

header{
background:#ff6f00;
color:white;
padding:20px;
font-size:22px;
}

.tagline{
font-size:14px;
margin-top:5px;
}

.gov{
font-size:12px;
color:#006400;
margin-top:5px;
}

.container{
padding:15px;
}

button{
width:90%;
padding:16px;
margin:10px;
font-size:17px;
border:none;
border-radius:10px;
background:#1976d2;
color:white;
}

.emergency{
background:red;
font-size:20px;
}

.card{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 0 6px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<header>
🚑 Jeevan Rakshak UP
<div class="tagline">Saving Lives Across Uttar Pradesh</div>
<div class="gov">Government of Uttar Pradesh – Prototype</div>
</header>

<div class="container">

<button onclick="getLocation()">📍 Find Nearby Hospitals</button>

<button onclick="showHospitals()">🏥 UP Hospital List</button>

<button onclick="showBlood()">🩸 Blood Availability</button>

<button onclick="openMap()">🗺 View Live Hospital Map</button>

<button class="emergency" onclick="sendSOS()">🚨 SOS Alert</button>

<a href="tel:108">
<button class="emergency">🚑 Call Ambulance (108)</button>
</a>

<div id="output"></div>

</div>

<script>

// LOCATION FUNCTION
function getLocation(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(showPosition);
}else{
alert("Location not supported");
}
}

function showPosition(position){
let lat = position.coords.latitude;
let lon = position.coords.longitude;

document.getElementById("output").innerHTML =
`
<div class="card">
📍 Your Location:<br>
Lat: ${lat}<br>
Lon: ${lon}
</div>

<a href="https://www.google.com/maps/search/hospital/@${lat},${lon},15z" target="_blank">
<button>🏥 View Nearby Hospitals</button>
</a>
`;
}

// HOSPITAL LIST
function showHospitals(){
document.getElementById("output").innerHTML =
`
<div class="card">King George Medical University, Lucknow</div>
<div class="card">SGPGI Lucknow</div>
<div class="card">AIIMS Gorakhpur</div>
<div class="card">District Hospital Noida</div>
`;
}

// BLOOD DATA
function showBlood(){
document.getElementById("output").innerHTML =
`
<div class="card">Red Cross Blood Bank<br>Available: O+, A+</div>
<div class="card">District Hospital Blood Bank<br>Available: B+, AB+</div>
`;
}

// MAP
function openMap(){
window.open("https://www.google.com/maps/search/hospital+near+me");
}

// SOS FUNCTION
function sendSOS(){
navigator.geolocation.getCurrentPosition(function(pos){
let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

let message = `EMERGENCY! I need help. My location: https://maps.google.com/?q=${lat},${lon}`;

alert("SOS Message:\n" + message);
});
}

</script>

</body>
</html>
